<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Today">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Today</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg2: #131313;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e4dc;
  --text2: #9e9a92;
  --text3: #5c5852;
  --text4: #2e2b28;

  --night: #378ADD; --night-l: #B5D4F4; --night-bg: rgba(55,138,221,0.08); --night-bd: rgba(55,138,221,0.2);
  --teal: #1D9E75;  --teal-l: #9FE1CB;  --teal-bg: rgba(29,158,117,0.08);  --teal-bd: rgba(29,158,117,0.2);
  --amber: #EF9F27; --amber-l: #FAC775; --amber-bg: rgba(239,159,39,0.08); --amber-bd: rgba(239,159,39,0.2);
  --purple: #7F77DD;--purple-l: #CECBF6;--purple-bg: rgba(127,119,221,0.08);--purple-bd: rgba(127,119,221,0.2);
  --coral: #D85A30; --coral-l: #F5C4B3; --coral-bg: rgba(216,90,48,0.08);  --coral-bd: rgba(216,90,48,0.2);
  --pink: #D4537E;  --pink-l: #F4C0D1;

  --office-accent: rgba(55,138,221,0.06);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  padding: 0;
  display: flex;
  flex-direction: column;
}

/* ── Time bar ────────────────────────────────── */
.timebar {
  padding: 18px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.timebar-time {
  font-family: 'DM Serif Display', serif;
  font-size: 48px;
  line-height: 1;
  color: var(--text);
  letter-spacing: -1px;
}

.timebar-right {
  text-align: right;
  padding-top: 4px;
}

.timebar-date {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* Office mode toggle */
.office-toggle {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  color: var(--text3);
  cursor: pointer;
  user-select: none;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.office-toggle:hover { border-color: var(--border2); color: var(--text2); }
.office-toggle.on { background: var(--night-bg); border-color: var(--night-bd); color: var(--night-l); }

.toggle-pip {
  width: 24px; height: 13px;
  border-radius: 7px;
  background: var(--border2);
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}

.toggle-pip::after {
  content: '';
  position: absolute;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--text3);
  top: 2px; left: 2px;
  transition: transform 0.2s, background 0.2s;
}

.office-toggle.on .toggle-pip { background: var(--night-bd); }
.office-toggle.on .toggle-pip::after { transform: translateX(11px); background: var(--night-l); }

/* ── Energy bar ──────────────────────────────── */
.energy-bar {
  margin: 16px 24px 0;
  display: flex;
  gap: 6px;
  align-items: center;
}

.energy-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text4); flex-shrink: 0; }

.energy-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.energy-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease, background 0.4s ease;
}

.energy-val { font-size: 9px; color: var(--text3); letter-spacing: 0.05em; flex-shrink: 0; }

/* ── Main card area ──────────────────────────── */
.cards {
  flex: 1;
  padding: 16px 24px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* One thing */
.card-one {
  border-radius: 12px;
  padding: 18px 20px;
  border: 1px solid;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.card-one::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1.5px;
}

.card-one .card-eyebrow {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 8px;
}

.card-one .card-main {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 20px;
  line-height: 1.25;
  color: var(--text);
}

.card-one .card-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 6px;
  line-height: 1.5;
}

/* Task row */
.card-tasks {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.tasks-header {
  padding: 10px 14px 8px;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text4);
  border-bottom: 1px solid var(--border);
}

.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.13s;
}

.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--bg3); }
.task-item.done { opacity: 0.4; }

.task-box {
  width: 14px; height: 14px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}

.task-item.done .task-box {
  background: var(--teal-bg);
  border-color: var(--teal-bd);
}

.task-item.done .task-box::after { content: '✓'; font-size: 8px; color: var(--teal-l); }

.task-text {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
  line-height: 1.4;
}

.task-item.done .task-text { text-decoration: line-through; color: var(--text3); }

.tasks-empty { padding: 12px 14px; font-size: 11px; color: var(--text4); font-style: italic; }

/* OS block card — office mode aware */
.card-os {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  transition: all 0.3s;
}

.card-os .os-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-os .os-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text4);
}

.os-mode-badge {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.08em;
  display: none;
}

.os-mode-badge.show { display: inline-block; }
.os-mode-badge.office { background: var(--night-bg); border: 1px solid var(--night-bd); color: var(--night-l); }

.os-blocks { display: flex; flex-direction: column; gap: 6px; }

.os-block-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  transition: all 0.2s;
  cursor: default;
}

.os-block-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}

.os-block-content { flex: 1; }

.os-block-title {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.4;
  margin-bottom: 2px;
}

.os-block-cover {
  font-size: 10px;
  color: var(--text3);
  font-style: italic;
  display: none;
  line-height: 1.4;
}

/* office mode reveals the disguise */
body.office-mode .os-block-cover { display: block; }
body.office-mode .card-os { background: var(--office-accent); border-color: var(--night-bd); }

/* Leisure card */
.card-leisure {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.leisure-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--purple-bg);
  border: 1px solid var(--purple-bd);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  color: var(--purple-l);
  font-family: 'DM Serif Display', serif;
  font-style: italic;
}

.leisure-content { flex: 1; }

.leisure-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text4); margin-bottom: 3px; }
.leisure-val { font-size: 12px; color: var(--text2); line-height: 1.4; }

/* ── Edit panel ──────────────────────────────── */
.edit-fab {
  position: fixed;
  bottom: 24px; right: 22px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  z-index: 100;
  font-family: monospace;
}

.edit-fab:hover { background: var(--bg2); color: var(--text2); border-color: rgba(255,255,255,0.2); }

.edit-panel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: none;
  align-items: flex-end;
}

.edit-panel.open { display: flex; }

.edit-sheet {
  width: 100%;
  background: var(--bg2);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border2);
  padding: 20px 22px 40px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease both;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.edit-handle {
  width: 36px; height: 3px;
  border-radius: 2px;
  background: var(--border2);
  margin: 0 auto 20px;
}

.edit-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 20px;
}

.edit-field { margin-bottom: 18px; }

.edit-label {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

textarea, input[type="text"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 10px 12px;
  resize: none;
  outline: none;
  line-height: 1.6;
  caret-color: var(--teal);
  transition: border-color 0.15s;
}

textarea:focus, input:focus { border-color: var(--teal-bd); }
textarea::placeholder, input::placeholder { color: var(--text4); font-style: italic; }

.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  font-size: 10px; padding: 5px 12px; border-radius: 5px;
  border: 1px solid var(--border); color: var(--text3);
  cursor: pointer; background: transparent;
  font-family: 'DM Mono', monospace; transition: all 0.13s; white-space: nowrap;
}
.chip:hover { border-color: var(--border2); color: var(--text2); }
.chip.on { background: var(--teal-bg); border-color: var(--teal-bd); color: var(--teal-l); }

.edit-tasks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
.edit-task-row { display: flex; gap: 7px; align-items: center; }
.edit-task-row input { flex: 1; }
.btn-del-task { background: none; border: none; color: var(--text4); font-size: 16px; cursor: pointer; padding: 0 4px; transition: color 0.13s; line-height: 1; }
.btn-del-task:hover { color: var(--text3); }
.btn-add-task {
  font-size: 10px; color: var(--text3); background: transparent;
  border: 1px dashed var(--border); border-radius: 5px;
  padding: 5px 11px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.13s;
}
.btn-add-task:hover { border-color: var(--border2); color: var(--text2); }

.edit-actions { display: flex; gap: 8px; margin-top: 24px; }

.btn-save-card {
  flex: 1; font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--teal-bd);
  background: var(--teal-bg); color: var(--teal-l); transition: all 0.13s;
}
.btn-save-card:hover { background: rgba(29,158,117,0.14); }

.btn-cancel {
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 12px 18px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text3);
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text2); }

/* ── No data state ───────────────────────────── */
.empty-state {
  padding: 32px 24px;
  text-align: center;
}
.empty-state-title {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text3);
  margin-bottom: 8px;
}
.empty-state-sub { font-size: 11px; color: var(--text4); line-height: 1.6; }

@media (min-width: 480px) {
  .timebar-time { font-size: 56px; }
  .card-one .card-main { font-size: 22px; }
}
</style>
</head>
<body>

<!-- Time bar -->
<div class="timebar">
  <div class="timebar-time" id="clock">--:--</div>
  <div class="timebar-right">
    <div class="timebar-date" id="topdate"></div>
    <div class="office-toggle" id="office-toggle" onclick="toggleOffice()">
      <div class="toggle-pip" id="toggle-pip"></div>
      <span id="office-label">Home</span>
    </div>
  </div>
</div>

<!-- Energy bar -->
<div class="energy-bar">
  <span class="energy-label">Energy</span>
  <div class="energy-track"><div class="energy-fill" id="energy-fill"></div></div>
  <span class="energy-val" id="energy-val">—</span>
</div>

<!-- Cards -->
<div class="cards" id="cards-area">
  <div class="empty-state" id="empty-state">
    <p class="empty-state-title">Nothing set for today.</p>
    <p class="empty-state-sub">Tap the pencil to fill in your day.</p>
  </div>
</div>

<!-- Install nudge -->
<div id="install-nudge" style="
  display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#141414;border:1px solid rgba(255,255,255,0.13);border-radius:10px;
  padding:10px 16px;display:none;align-items:center;gap:12px;z-index:150;
  font-family:'DM Mono',monospace;white-space:nowrap;
">
  <span style="font-size:11px;color:#9e9a92">Install as app?</span>
  <button onclick="installApp()" style="
    font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;border-radius:6px;
    cursor:pointer;border:1px solid rgba(29,158,117,0.3);background:rgba(29,158,117,0.08);
    color:#9FE1CB;
  ">Install</button>
  <button onclick="document.getElementById('install-nudge').style.display='none'" style="
    font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;border-radius:6px;
    cursor:pointer;border:none;background:transparent;color:#5c5852;
  ">✕</button>
</div>

<!-- Edit FAB -->
<button class="edit-fab" onclick="openEdit()" title="Edit today">✎</button>

<!-- Edit panel -->
<div class="edit-panel" id="edit-panel" onclick="handleOverlayClick(event)">
  <div class="edit-sheet" id="edit-sheet">
    <div class="edit-handle"></div>
    <p class="edit-title">Set today's card.</p>

    <div class="edit-field">
      <p class="edit-label">Energy level</p>
      <div class="chips" id="edit-energy-chips">
        <button class="chip" data-val="high"    onclick="pickChip(this,'energy')">↑ High</button>
        <button class="chip" data-val="medium"  onclick="pickChip(this,'energy')">→ Medium</button>
        <button class="chip" data-val="low"     onclick="pickChip(this,'energy')">↓ Low</button>
        <button class="chip" data-val="unknown" onclick="pickChip(this,'energy')">– Unknown</button>
      </div>
    </div>

    <div class="edit-field">
      <p class="edit-label">The one thing</p>
      <textarea id="edit-one" rows="2" placeholder="I will have…"></textarea>
    </div>

    <div class="edit-field">
      <p class="edit-label">Life admin tasks (1–3 max)</p>
      <div class="edit-tasks" id="edit-task-list"></div>
      <button class="btn-add-task" onclick="addEditTask()">+ add task</button>
    </div>

    <div class="edit-field">
      <p class="edit-label">OS block for today</p>
      <div class="chips" id="edit-os-chips">
        <button class="chip" data-val="learning"  onclick="pickChip(this,'os')">Learning</button>
        <button class="chip" data-val="creative"  onclick="pickChip(this,'os')">Creative brief</button>
        <button class="chip" data-val="financial" onclick="pickChip(this,'os')">Financial</button>
        <button class="chip" data-val="research"  onclick="pickChip(this,'os')">Research</button>
        <button class="chip" data-val="connection"onclick="pickChip(this,'os')">Connection</button>
        <button class="chip" data-val="none"      onclick="pickChip(this,'os')">None today</button>
      </div>
      <input type="text" id="edit-os-detail" placeholder="Specific task or topic…" style="margin-top:8px">
    </div>

    <div class="edit-field">
      <p class="edit-label">Evening leisure</p>
      <div class="chips" id="edit-leisure-chips">
        <button class="chip" data-val="social"   onclick="pickChip(this,'leisure')">Social</button>
        <button class="chip" data-val="creative" onclick="pickChip(this,'leisure')">Creative play</button>
        <button class="chip" data-val="body"     onclick="pickChip(this,'leisure')">Body</button>
        <button class="chip" data-val="quiet"    onclick="pickChip(this,'leisure')">Quiet</button>
        <button class="chip" data-val="out"      onclick="pickChip(this,'leisure')">Out</button>
        <button class="chip" data-val="free"     onclick="pickChip(this,'leisure')">Free</button>
      </div>
      <input type="text" id="edit-leisure-detail" placeholder="Specific — film, place, person…" style="margin-top:8px">
    </div>

    <div class="edit-actions">
      <button class="btn-save-card" onclick="saveCard()">Save to card →</button>
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
    </div>

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
      <p class="edit-label" style="margin-bottom:10px">Restore from backup</p>
      <textarea id="import-area" rows="4" placeholder="Paste a copied card backup here to restore today's state…" style="margin-bottom:8px;font-size:11px"></textarea>
      <div style="display:flex;gap:8px">
        <button onclick="importFromMarkdown()" style="
          font-family:'DM Mono',monospace;font-size:10px;padding:8px 14px;border-radius:6px;
          cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);
          transition:all 0.13s;
        " onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'">
          Import
        </button>
        <button onclick="manualCopy()" style="
          font-family:'DM Mono',monospace;font-size:10px;padding:8px 14px;border-radius:6px;
          cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);
          transition:all 0.13s;
        " onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'" id="manual-copy-btn">
          Copy current card
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Clock ──────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);

document.getElementById('topdate').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }).toUpperCase();

// ── Storage ────────────────────────────────────────────
const DATE_KEY = new Date().toISOString().split('T')[0];
const STORE = 'daily_card_v1';

function load() {
  try {
    const hash = location.hash.slice(1);
    if (hash) {
      const decoded = JSON.parse(atob(hash));
      if (decoded && decoded[DATE_KEY]) return decoded;
    }
  } catch(e) {}
  return JSON.parse(localStorage.getItem(STORE) || '{}');
}

function save(data) {
  localStorage.setItem(STORE, JSON.stringify(data));
  try {
    const todayOnly = { [DATE_KEY]: data[DATE_KEY] };
    location.hash = btoa(JSON.stringify(todayOnly));
  } catch(e) {}
}

function toMarkdown(d) {
  if (!d) return '';
  const lines = [`# Daily Card — ${DATE_KEY}`, '',
    `**Energy:** ${d.energy || '—'}`,
    `**One thing:** ${d.one || '—'}`,
  ];
  if (d.tasks && d.tasks.length) {
    lines.push('**Tasks:**');
    d.tasks.forEach(t => lines.push(`- [${t.done?'x':' '}] ${t.text}`));
  }
  if (d.os && d.os !== 'none') lines.push(`**OS block:** ${d.osDetail || d.os}`);
  if (d.leisure) lines.push(`**Leisure:** ${d.leisureDetail || d.leisure}`);
  lines.push('', `_${DATE_KEY} · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}_`);
  return lines.join('\n');
}

function fromMarkdown(md) {
  const d = { energy:'', one:'', tasks:[], os:'', osDetail:'', leisure:'', leisureDetail:'' };
  md.split('\n').forEach(line => {
    const energy = line.match(/\*\*Energy:\*\* (.+)/);   if (energy) d.energy = energy[1].trim();
    const one    = line.match(/\*\*One thing:\*\* (.+)/); if (one)    d.one    = one[1].trim();
    const os     = line.match(/\*\*OS block:\*\* (.+)/);  if (os)     d.osDetail = os[1].trim();
    const lei    = line.match(/\*\*Leisure:\*\* (.+)/);   if (lei)    d.leisureDetail = lei[1].trim();
    const task   = line.match(/^- \[( |x)\] (.+)/);
    if (task) d.tasks.push({ done: task[1]==='x', text: task[2].trim() });
  });
  return d;
}

// ── Office mode ────────────────────────────────────────
let officeMode = localStorage.getItem('office_mode') === 'true';

const OS_DISGUISE = {
  learning:   'Reading industry article / research',
  creative:   'Drafting notes / document',
  financial:  'Reviewing spreadsheet / admin',
  research:   'Background reading / synthesis',
  connection: 'Drafting a message / email',
  none:       null
};

function toggleOffice() {
  officeMode = !officeMode;
  localStorage.setItem('office_mode', officeMode);
  applyOfficeMode();
}

function applyOfficeMode() {
  const tog = document.getElementById('office-toggle');
  const lbl = document.getElementById('office-label');
  tog.classList.toggle('on', officeMode);
  lbl.textContent = officeMode ? 'Office' : 'Home';
  document.body.classList.toggle('office-mode', officeMode);
  const badge = document.getElementById('os-mode-badge');
  if (badge) badge.classList.toggle('show', officeMode);
  // Update OS block label in card
  renderCard();
}

// ── Chip picker ───────────────────────────────────────
const chipSelections = { energy: '', os: '', leisure: '' };

function pickChip(el, group) {
  const container = document.getElementById('edit-'+group+'-chips');
  container.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  chipSelections[group] = el.dataset.val;
}

function setChip(group, val) {
  if (!val) return;
  const container = document.getElementById('edit-'+group+'-chips');
  if (!container) return;
  container.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('on', c.dataset.val === val);
  });
  chipSelections[group] = val;
}

// ── Edit tasks ────────────────────────────────────────
function addEditTask(text='') {
  const list = document.getElementById('edit-task-list');
  const row = document.createElement('div');
  row.className = 'edit-task-row';
  row.innerHTML = `<input type="text" placeholder="task…" value="${text}">
    <button class="btn-del-task" onclick="this.closest('.edit-task-row').remove()">×</button>`;
  list.appendChild(row);
}

function getEditTasks() {
  return Array.from(document.querySelectorAll('.edit-task-row input'))
    .map(i => i.value.trim()).filter(Boolean);
}

// ── Open / close edit ─────────────────────────────────
function openEdit() {
  const all = load();
  const d = all[DATE_KEY] || {};
  // Restore values
  document.getElementById('edit-one').value = d.one || '';
  document.getElementById('edit-os-detail').value = d.osDetail || '';
  document.getElementById('edit-leisure-detail').value = d.leisureDetail || '';
  setChip('energy', d.energy);
  setChip('os', d.os);
  setChip('leisure', d.leisure);
  document.getElementById('edit-task-list').innerHTML = '';
  (d.tasks || []).forEach(t => addEditTask(typeof t === 'object' ? t.text : t));
  document.getElementById('edit-panel').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-panel').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('edit-panel')) closeEdit();
}

// ── Save card ─────────────────────────────────────────
function saveCard() {
  const all = load();
  const entry = {
    energy:        chipSelections.energy,
    one:           document.getElementById('edit-one').value.trim(),
    tasks:         getEditTasks().map(t => ({ text: t, done: false })),
    os:            chipSelections.os,
    osDetail:      document.getElementById('edit-os-detail').value.trim(),
    leisure:       chipSelections.leisure,
    leisureDetail: document.getElementById('edit-leisure-detail').value.trim(),
  };
  all[DATE_KEY] = entry;
  save(all);

  // Auto-copy markdown to clipboard as backup
  const md = toMarkdown(entry);
  try {
    navigator.clipboard.writeText(md).catch(() => {});
  } catch(e) {}

  // Show copy confirmation
  const btn = document.querySelector('.btn-save-card');
  if (btn) { btn.textContent = 'Saved + copied ✓'; setTimeout(() => btn.textContent = 'Save to card →', 2000); }

  closeEdit();
  renderCard();
}

// ── Import from markdown ──────────────────────────────
function importFromMarkdown() {
  const ta = document.getElementById('import-area');
  if (!ta || !ta.value.trim()) return;
  const parsed = fromMarkdown(ta.value.trim());
  if (!parsed.one) { ta.placeholder = 'Could not parse — paste a card backup here'; return; }
  const all = load();
  all[DATE_KEY] = parsed;
  save(all);
  // Restore chip state from parsed data
  if (parsed.energy) chipSelections.energy = parsed.energy;
  if (parsed.os)     chipSelections.os = parsed.os;
  if (parsed.leisure)chipSelections.leisure = parsed.leisure;
  ta.value = '';
  closeEdit();
  renderCard();
}

// ── Task toggle ───────────────────────────────────────
function toggleTask(idx) {
  const all = load();
  const d = all[DATE_KEY];
  if (!d || !d.tasks) return;
  d.tasks[idx].done = !d.tasks[idx].done;
  save(all);
  renderCard();
}

// ── Render card ───────────────────────────────────────
const ENERGY_MAP = {
  high:    { pct: 92, color: '#1D9E75', label: 'High' },
  medium:  { pct: 55, color: '#EF9F27', label: 'Medium' },
  low:     { pct: 24, color: '#378ADD', label: 'Low' },
  unknown: { pct: 0,  color: '#5c5852', label: '—' },
};

const DOMAIN_COLOR = {
  learning:   { dot: '#1D9E75', bg: 'rgba(29,158,117,0.08)',  bd: 'rgba(29,158,117,0.2)' },
  creative:   { dot: '#7F77DD', bg: 'rgba(127,119,221,0.08)', bd: 'rgba(127,119,221,0.2)' },
  financial:  { dot: '#EF9F27', bg: 'rgba(239,159,39,0.08)',  bd: 'rgba(239,159,39,0.2)' },
  research:   { dot: '#378ADD', bg: 'rgba(55,138,221,0.08)',  bd: 'rgba(55,138,221,0.2)' },
  connection: { dot: '#D85A30', bg: 'rgba(216,90,48,0.08)',   bd: 'rgba(216,90,48,0.2)' },
};

const LEISURE_ICON = { social:'s', creative:'c', body:'b', quiet:'q', out:'o', free:'f' };

function renderCard() {
  const all = load();
  const d = all[DATE_KEY];
  const area = document.getElementById('cards-area');
  const empty = document.getElementById('empty-state');

  if (!d || !d.one) {
    empty.style.display = 'block';
    // Remove dynamic cards
    ['card-one','card-tasks','card-os','card-leisure'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.remove();
    });
    return;
  }

  empty.style.display = 'none';

  // Energy bar
  const em = ENERGY_MAP[d.energy] || ENERGY_MAP.unknown;
  document.getElementById('energy-fill').style.width = em.pct + '%';
  document.getElementById('energy-fill').style.background = em.color;
  document.getElementById('energy-val').textContent = em.label;

  // ── One thing card ──
  let oneCard = document.getElementById('card-one');
  if (!oneCard) {
    oneCard = document.createElement('div');
    oneCard.id = 'card-one';
    oneCard.className = 'card-one';
    area.insertBefore(oneCard, area.firstChild);
  }
  const ec = d.energy || 'unknown';
  const colorMap = { high: ['var(--teal-l)','rgba(29,158,117,0.12)','rgba(29,158,117,0.25)','var(--teal)'],
                     medium:['var(--amber-l)','rgba(239,159,39,0.1)','rgba(239,159,39,0.22)','var(--amber)'],
                     low:   ['var(--night-l)','rgba(55,138,221,0.1)','rgba(55,138,221,0.22)','var(--night)'],
                     unknown:['var(--text2)','rgba(136,135,128,0.06)','rgba(136,135,128,0.12)','var(--text3)'] };
  const [eyeC, bgC, bdC, lineC] = colorMap[ec] || colorMap.unknown;
  oneCard.style.background = bgC;
  oneCard.style.borderColor = bdC;
  oneCard.innerHTML = `
    <div style="position:absolute;top:0;left:0;right:0;height:1.5px;background:${lineC};border-radius:12px 12px 0 0"></div>
    <p class="card-eyebrow" style="color:${eyeC};opacity:0.55">Today's one thing</p>
    <p class="card-main">${d.one}</p>
  `;

  // ── Tasks card ──
  let tasksCard = document.getElementById('card-tasks');
  if (!tasksCard) {
    tasksCard = document.createElement('div');
    tasksCard.id = 'card-tasks';
    tasksCard.className = 'card-tasks';
    area.appendChild(tasksCard);
  }
  if (d.tasks && d.tasks.length) {
    tasksCard.style.display = '';
    tasksCard.innerHTML = `<div class="tasks-header">Life admin</div>` +
      d.tasks.map((t, i) => `
        <div class="task-item${t.done?' done':''}" onclick="toggleTask(${i})">
          <div class="task-box"></div>
          <span class="task-text">${t.text}</span>
        </div>
      `).join('');
  } else {
    tasksCard.style.display = 'none';
  }

  // ── OS block card ──
  let osCard = document.getElementById('card-os');
  if (!osCard) {
    osCard = document.createElement('div');
    osCard.id = 'card-os';
    osCard.className = 'card-os';
    area.appendChild(osCard);
  }
  if (d.os && d.os !== 'none') {
    osCard.style.display = '';
    const dc = DOMAIN_COLOR[d.os] || DOMAIN_COLOR.learning;
    const disguise = OS_DISGUISE[d.os] || '';
    osCard.innerHTML = `
      <div class="os-header">
        <span class="os-label">OS block</span>
        <span class="os-mode-badge office${officeMode?' show':''}" id="os-mode-badge">office mode</span>
      </div>
      <div class="os-blocks">
        <div class="os-block-item" style="background:${dc.bg};border-color:${dc.bd}">
          <div class="os-block-dot" style="background:${dc.dot}"></div>
          <div class="os-block-content">
            <div class="os-block-title">${d.osDetail || d.os}</div>
            ${disguise ? `<div class="os-block-cover">Looks like: ${disguise}</div>` : ''}
          </div>
        </div>
        ${d.osTask ? `
        <div style="margin-top:8px;padding:10px 12px;border-radius:7px;background:${dc.bg};border:1px solid ${dc.bd}">
          <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:${dc.dot};margin-bottom:5px">Next up</div>
          <div style="font-size:12px;color:var(--text);line-height:1.45;margin-bottom:${d.osTask.firstAction?'4px':'0'}">${d.osTask.title}</div>
          ${d.osTask.firstAction ? `<div style="font-size:10px;color:var(--text3);font-style:italic">First: ${d.osTask.firstAction}</div>` : ''}
        </div>` : ''}
      </div>
    `;
  } else {
    osCard.style.display = 'none';
  }

  // ── Leisure card ──
  let leisureCard = document.getElementById('card-leisure');
  if (!leisureCard) {
    leisureCard = document.createElement('div');
    leisureCard.id = 'card-leisure';
    leisureCard.className = 'card-leisure';
    area.appendChild(leisureCard);
  }
  if (d.leisure) {
    leisureCard.style.display = '';
    const icon = LEISURE_ICON[d.leisure] || 'e';
    leisureCard.innerHTML = `
      <div class="leisure-icon">${icon}</div>
      <div class="leisure-content">
        <p class="leisure-label">Evening leisure</p>
        <p class="leisure-val">${d.leisureDetail || d.leisure}</p>
      </div>
    `;
  } else {
    leisureCard.style.display = 'none';
  }

  applyOfficeMode();
}

// ── Manual copy ───────────────────────────────────────
function manualCopy() {
  const all = load();
  const d = all[DATE_KEY];
  if (!d) return;
  const md = toMarkdown(d);
  navigator.clipboard.writeText(md).then(() => {
    const btn = document.getElementById('manual-copy-btn');
    if (btn) { btn.textContent = 'Copied ✓'; setTimeout(() => btn.textContent = 'Copy current card', 2000); }
  }).catch(() => {
    const ta = document.getElementById('import-area');
    if (ta) { ta.value = md; ta.select(); document.execCommand('copy'); }
  });
}

// ── Service Worker + Install prompt ───────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  // Show install nudge
  const nudge = document.getElementById('install-nudge');
  if (nudge) nudge.style.display = 'flex';
});

function installApp() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(() => {
    deferredInstall = null;
    const nudge = document.getElementById('install-nudge');
    if (nudge) nudge.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  const nudge = document.getElementById('install-nudge');
  if (nudge) nudge.style.display = 'none';
});

// ── Init ──────────────────────────────────────────────
applyOfficeMode();
renderCard();
</script>
</body>
</html>
